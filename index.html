<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Jeu</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  background-image: url("bg.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  height: 100vh;
  position: relative;
}

/* bouton play en haut */
#play {
  position: absolute;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 150px;
  height: auto;
  cursor: pointer;
}

/* balle au centre */
#balle {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 120px;
  height: auto;
}
</style>

</head>

<body>

<img id="play" src="play.png" alt="Play">
<img id="balle" src="balle.png" alt="Balle">

</body>
</html>
